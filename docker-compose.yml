services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vault_pad}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_DSN: ${DATABASE_DSN:-root:root@tcp(db:3306)/vault_pad?parseTime=true}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      LISTEN_ADDR: ${LISTEN_ADDR:-:8080}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@local.local}
    ports:
      - "8080:8080"

volumes:
  mysql_data:
